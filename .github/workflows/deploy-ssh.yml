# 1) CI (workflow_call)
# 2) Build + push một image lên GHCR (tag = SHA + latest)
# 3) SSH server: git pull, docker login, pull image, compose up (không build trên server)
#
# Secrets: xem docs/cicd-deploy.md

name: Deploy (SSH + GHCR)

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-assign-refu-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  build-and-push:
    name: Build and push image
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      registry_base: ${{ steps.meta.outputs.registry_base }}
    env:
      IMAGE_NAME: assign-refu-manager-service
    steps:
      - uses: actions/checkout@v4

      - name: Image metadata (GHCR, owner lowercase)
        id: meta
        run: |
          set -euo pipefail
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          registry_base="ghcr.io/${owner_lc}/${IMAGE_NAME}"
          echo "registry_base=${registry_base}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.registry_base }}:${{ github.sha }}
            ${{ steps.meta.outputs.registry_base }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on server
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: SSH host key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          PORT="${SSH_PORT:-22}"
          ssh-keyscan -H -p "$PORT" "$SSH_HOST" >> ~/.ssh/known_hosts
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}

      - name: SSH — git pull + pull image + compose up
        uses: appleboy/ssh-action@v1.2.0
        env:
          REGISTRY_BASE: ${{ needs.build-and-push.outputs.registry_base }}
          IMAGE_TAG: ${{ github.sha }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          HEALTH_PORT: ${{ secrets.HEALTH_CHECK_PORT }}
          REPO_SLUG: ${{ github.repository }}
          # Repo private: thử PAT (nếu có), fallback sang GITHUB_TOKEN của job khi PAT sai quyền.
          GIT_PULL_TOKEN: ${{ secrets.GIT_PULL_TOKEN }}
          GH_JOB_TOKEN: ${{ github.token }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: REGISTRY_BASE,IMAGE_TAG,DEPLOY_PATH,GHCR_PULL_USERNAME,GHCR_PULL_TOKEN,HEALTH_PORT,REPO_SLUG,GIT_PULL_TOKEN,GH_JOB_TOKEN
          script_stop: true
          script: |
            set -euo pipefail
            test -n "${DEPLOY_PATH:-}"
            cd "$DEPLOY_PATH"
            docker compose version >/dev/null

            if [ -d ".git" ]; then
              pull_token="${GIT_PULL_TOKEN:-}"
              if [ -n "${pull_token}" ]; then
                git remote set-url origin "https://x-access-token:${pull_token}@github.com/${REPO_SLUG}.git"
                if ! git fetch origin; then
                  echo "GIT_PULL_TOKEN không đủ quyền, fallback sang GITHUB_TOKEN."
                  pull_token="${GH_JOB_TOKEN}"
                  git remote set-url origin "https://x-access-token:${pull_token}@github.com/${REPO_SLUG}.git"
                  git fetch origin
                fi
              else
                pull_token="${GH_JOB_TOKEN}"
                git remote set-url origin "https://x-access-token:${pull_token}@github.com/${REPO_SLUG}.git"
                git fetch origin
              fi
              git checkout main
              git pull --ff-only origin main
            else
              echo "Warning: DEPLOY_PATH is not a git clone — chỉ compose pull/up."
            fi

            if [ -n "${GHCR_PULL_TOKEN:-}" ] && [ -n "${GHCR_PULL_USERNAME:-}" ]; then
              echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "$GHCR_PULL_USERNAME" --password-stdin
            else
              echo "Không có GHCR_PULL_* — giả định image public hoặc server đã login ghcr.io."
            fi

            export REGISTRY_BASE IMAGE_TAG
            docker compose -f docker-compose.deploy.yml pull

            stale_ids="$(docker ps -aq --filter name=giaodich-backend || true)"
            if [ -n "${stale_ids}" ]; then
              docker rm -f ${stale_ids} || true
            fi

            docker compose -f docker-compose.deploy.yml up -d --remove-orphans

            HP="${HEALTH_PORT:-1389}"
            sleep 6
            curl -fsS "http://127.0.0.1:${HP}/health"
            docker compose -f docker-compose.deploy.yml ps
