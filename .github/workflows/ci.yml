# Typecheck — PR vào `main`, và được `workflow_call` từ deploy trước khi build image.

name: CI

on:
  workflow_call:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-assign-refu-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run build
