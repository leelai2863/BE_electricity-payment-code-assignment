# Rollback: kéo image theo SHA cũ đã từng push lên GHCR, rồi compose up lại.

name: Rollback deploy

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: "Commit SHA (image tag trên GHCR), ví dụ abc123def456..."
        required: true
        type: string

concurrency:
  group: rollback-assign-refu-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ steps.v.outputs.target_sha }}
      registry_base: ${{ steps.v.outputs.registry_base }}
    env:
      IMAGE_NAME: assign-refu-manager-service
    steps:
      - id: v
        shell: bash
        run: |
          set -euo pipefail
          sha="${{ inputs.target_sha }}"
          if [[ ! "$sha" =~ ^[0-9a-f]{7,40}$ ]]; then
            echo "Invalid target_sha: $sha"
            exit 1
          fi
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          echo "target_sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "registry_base=ghcr.io/${owner_lc}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

  rollback:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: SSH host key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          PORT="${SSH_PORT:-22}"
          ssh-keyscan -H -p "$PORT" "$SSH_HOST" >> ~/.ssh/known_hosts
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}

      - name: SSH — pull tag + compose up
        uses: appleboy/ssh-action@v1.2.0
        env:
          REGISTRY_BASE: ${{ needs.validate.outputs.registry_base }}
          IMAGE_TAG: ${{ needs.validate.outputs.target_sha }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          HEALTH_PORT: ${{ secrets.HEALTH_CHECK_PORT }}
          REPO_SLUG: ${{ github.repository }}
          GIT_PULL_TOKEN: ${{ secrets.GIT_PULL_TOKEN || github.token }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: REGISTRY_BASE,IMAGE_TAG,DEPLOY_PATH,GHCR_PULL_USERNAME,GHCR_PULL_TOKEN,HEALTH_PORT,REPO_SLUG,GIT_PULL_TOKEN
          script_stop: true
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"
            if [ -d ".git" ]; then
              git remote set-url origin "https://x-access-token:${GIT_PULL_TOKEN}@github.com/${REPO_SLUG}.git"
            fi
            if [ -n "${GHCR_PULL_TOKEN:-}" ] && [ -n "${GHCR_PULL_USERNAME:-}" ]; then
              echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "$GHCR_PULL_USERNAME" --password-stdin
            fi
            export REGISTRY_BASE IMAGE_TAG
            docker pull "${REGISTRY_BASE}:${IMAGE_TAG}"
            stale_ids="$(docker ps -aq --filter name=giaodich-backend || true)"
            if [ -n "${stale_ids}" ]; then
              docker rm -f ${stale_ids} || true
            fi
            docker compose -f docker-compose.deploy.yml up -d --remove-orphans
            HP="${HEALTH_PORT:-1389}"
            sleep 6
            curl -fsS "http://127.0.0.1:${HP}/health"
            docker compose -f docker-compose.deploy.yml ps
