# Production: MongoDB KHÔNG mở cổng ra host — chỉ backend + mongo nói chuyện trong mạng nội bộ Docker.
#
# Kiến trúc: IAM, fe-gateway (CRM) và BE này deploy riêng; chúng gọi nhau qua URL công khai (HTTPS + domain),
# không dùng Docker network nối chéo giữa các stack.
#
# Tunnel mẫu: Cloudflare (hoặc tương đương) trỏ https://giaoma.nguyentrungnam.com → tcp://127.0.0.1:1389
# (cổng host mặc định bên dưới). Gateway/CRM cấu hình ELEC_SERVICE_URL=https://giaoma.nguyentrungnam.com
#
# Chạy (Compose tự đọc file `.env` cùng thư mục để substitute biến):
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Bắt buộc set trong `.env` trên server (hoặc export):
#   CORS_ORIGIN=https://origin-crm-qua-gateway   (browser gọi API qua cùng origin hoặc liệt kê đúng CRM)
#   OPENAI_API_KEY=...   (nếu dùng OCR)
#
# Cổng host: mặc định 1389 (tunnel). Đổi bằng BACKEND_HOST_PORT trong `.env` nếu cần (vd. 3001 khi test local).
#
# Seed lần đầu (bắt buộc khi volume Mongo mới): sau khi stack up — `npm run docker:seed` hoặc `sh scripts/first-run-seed.sh`.
# Import Excel: job one-off (xem README mục Production).

services:
  backend:
    # Trùng tên image khi `docker save` / `docker load` (deploy qua scp không cần build trên server).
    image: be_electricity-payment-code-assignment-backend
    build: .
    container_name: giaodich-backend
    ports:
      - "${BACKEND_HOST_PORT:-1389}:3001"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/giaodich_voucher
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_VISION_MODEL=${OPENAI_VISION_MODEL:-gpt-4o-mini}
      - OPENAI_TEXT_MODEL=${OPENAI_TEXT_MODEL:-gpt-4o-mini}
      - PORT=3001
      # Trên server thật set CORS_ORIGIN trong `.env` (HTTPS CRM/gateway).
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: giaodich-mongo
    # Không có mục "ports" — không publish 27017 ra ngoài host (bảo mật).
    volumes:
      - mongo_data:/data/db
      - ./mongo-seed:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
