# Production: MongoDB KHÔNG mở cổng ra host — chỉ backend + mongo nói chuyện trong mạng nội bộ Docker.
# Chạy:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Bắt buộc set trong .env.prod (hoặc export):
#   CORS_ORIGIN=https://domain-frontend-cua-ban
#   OPENAI_API_KEY=...   (nếu dùng OCR)
#
# Seed / import Excel: chạy job one-off trong cùng network (xem README mục Production).

services:
  backend:
    build: .
    container_name: giaodich-backend
    ports:
      - "${BACKEND_HOST_PORT:-3001}:3001"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/giaodich_voucher
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_VISION_MODEL=${OPENAI_VISION_MODEL:-gpt-4o-mini}
      - OPENAI_TEXT_MODEL=${OPENAI_TEXT_MODEL:-gpt-4o-mini}
      - PORT=3001
      # Trên server thật nên ghi đè bằng URL HTTPS của frontend (xem .env.prod.example).
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: giaodich-mongo
    # Không có mục "ports" — không publish 27017 ra ngoài host (bảo mật).
    volumes:
      - mongo_data:/data/db
      - ./mongo-seed:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
